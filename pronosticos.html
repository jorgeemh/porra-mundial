<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis pronósticos · Porra Mundial 2026</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#ec4899">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <span id="usuario-nombre"></span>
    <nav>
      <a href="pronosticos.html" class="activo">Pronósticos</a>
      <a href="grupos.html">Grupos</a>
      <a href="cuadro.html">Cuadro</a>
      <a href="clasificacion.html">Clasificación</a>
      <a href="admin.html" id="link-admin" style="display:none">Admin</a>
      <a href="#" id="btn-salir">Salir</a>
    </nav>
  </div>
</header>

<main class="container">
  <div id="error" class="error" style="display:none"></div>

  <div class="pron-tabs" role="tablist">
    <button class="pron-tab activo" data-tab="grupos" role="tab">
      <span class="pron-tab-icon">⚽</span>
      <div class="pron-tab-info">
        <div class="pron-tab-title">Fase de grupos</div>
        <div class="pron-tab-counter" id="counter-grupos">—</div>
      </div>
    </button>
    <button class="pron-tab" data-tab="elim" role="tab">
      <span class="pron-tab-icon">🏆</span>
      <div class="pron-tab-info">
        <div class="pron-tab-title">Eliminatorias</div>
        <div class="pron-tab-counter" id="counter-elim">—</div>
      </div>
    </button>
    <button class="pron-tab" data-tab="goleador" role="tab">
      <span class="pron-tab-icon">⚽️</span>
      <div class="pron-tab-info">
        <div class="pron-tab-title">Máx. goleador</div>
        <div class="pron-tab-counter" id="counter-goleador">—</div>
      </div>
    </button>
    <button class="pron-tab" data-tab="mvp" role="tab">
      <span class="pron-tab-icon">🌟</span>
      <div class="pron-tab-info">
        <div class="pron-tab-title">MVP</div>
        <div class="pron-tab-counter" id="counter-mvp">—</div>
      </div>
    </button>
  </div>

  <section class="card pron-panel" id="panel-grupos">
    <h2>Fase de grupos</h2>
    <p class="sub" id="estado-grupos"></p>
    <div id="grupos"></div>
  </section>

  <section class="card pron-panel" id="panel-elim" style="display:none">
    <h2>Cuadro eliminatorio</h2>
    <p class="sub" id="estado-bracket"></p>
    <div id="bracket"></div>
    <button id="btn-guardar-bracket" style="display:none">Guardar bracket completo</button>
  </section>

  <section class="card pron-panel" id="panel-goleador" style="display:none">
    <h2>⚽️ Máximo goleador del torneo</h2>
    <p class="sub" id="estado-goleador"></p>
    <div class="buscador-jugador">
      <input type="search" id="busca-goleador" placeholder="🔍 Buscar jugador o selección…" autocomplete="off">
    </div>
    <div class="jugadores-grid" id="grid-goleador"></div>
  </section>

  <section class="card pron-panel" id="panel-mvp" style="display:none">
    <h2>🌟 MVP del torneo</h2>
    <p class="sub" id="estado-mvp"></p>
    <div class="buscador-jugador">
      <input type="search" id="busca-mvp" placeholder="🔍 Buscar jugador o selección…" autocomplete="off">
    </div>
    <div class="jugadores-grid" id="grid-mvp"></div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/modal.js"></script>
<script src="js/teams.js"></script>
<script src="js/partidos.js"></script>
</body>
</html>
